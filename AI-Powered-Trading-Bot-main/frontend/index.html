<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFO Trading Bot - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body {
      background: radial-gradient(circle at 10% 20%, rgba(60, 60, 80, 0.25), transparent 20%),
                  radial-gradient(circle at 90% 10%, rgba(80, 60, 90, 0.25), transparent 18%),
                  #0f1116;
      color: #e9edf4;
      min-height: 100vh;
    }
    .glass {
      background: rgba(26, 27, 35, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }
    #log-window {
      background: #0a0c10;
      color: #d1d5db;
      height: 340px;
      overflow-y: auto;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .pill-label {
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .pill-label:hover {
      border-color: rgba(99, 179, 237, 0.8);
      color: #9fd2ff;
    }
    .form-section-title {
      letter-spacing: 0.03em;
      color: #9db7ff;
      font-size: 0.95rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body class="py-4">
  <div class="container">
    <div class="d-flex flex-wrap align-items-start gap-3 mb-4">
      <div>
        <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary bg-opacity-10 text-primary me-3" style="width:52px; height:52px;">
          <span class="fs-4 fw-semibold">Ξ</span>
        </div>
      </div>
      <div>
        <h1 class="h3 mb-1">HFO Trading Bot</h1>
        <p class="text-secondary mb-0">CSE 351 project: AI Powered Trading Bot</p>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="glass rounded-4 p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Settings</h2>
            <span class="badge text-bg-primary text-uppercase">Config</span>
          </div>

          <div class="mb-3">
            <label for="symbol" class="form-label">Coin Symbol</label>
            <select id="symbol" class="form-select form-select-lg">
              <option value="BTCUSDT">BTCUSDT</option>
              <option value="ETHUSDT">ETHUSDT</option>
              <option value="BNBUSDT">BNBUSDT</option>
            </select>
          </div>

          <div class="mb-3">
            <div class="form-section-title mb-2">Mode</div>
            <div class="d-flex gap-3 flex-wrap">
              <div class="form-check pill-label">
                <input class="form-check-input" type="radio" name="mode" id="mode-live" value="1">
                <label class="form-check-label" for="mode-live">Live Trading</label>
              </div>
              <div class="form-check pill-label">
                <input class="form-check-input" type="radio" name="mode" id="mode-backtest" value="2" checked>
                <label class="form-check-label" for="mode-backtest">Backtest</label>
              </div>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label for="initial_balance" class="form-label">Initial Balance ($)</label>
              <input type="number" class="form-control form-control-lg" id="initial_balance" placeholder="10000" min="0">
            </div>
            <div class="col-12">
              <label for="stop_loss_pct" class="form-label">Stop Loss %</label>
              <input type="number" class="form-control form-control-lg" id="stop_loss_pct" placeholder="2" min="0" step="0.1">
            </div>
          </div>

          <div class="mt-4">
            <div class="form-section-title mb-2">Backtest Settings</div>
            <div id="backtest-settings" class="row g-3">
              <div class="col-12">
                <label for="candle_interval" class="form-label">Candle Interval</label>
                <select id="candle_interval" class="form-select form-select-lg">
                  <option value="1m">1m</option>
                  <option value="5m">5m</option>
                  <option value="30m">30m</option>
                  <option value="1h">1h</option>
                  <option value="1d">1d</option>
                  <option value="1w">1w</option>
                  <option value="1M">1M</option>
                </select>
              </div>
              <div class="col-12">
                <label for="check_date" class="form-label">Date Range</label>
                <select id="check_date" class="form-select form-select-lg">
                  <option value="1 hour ago UTC">1 hour ago UTC</option>
                  <option value="1 day ago UTC">1 day ago UTC</option>
                  <option value="1 month ago UTC">1 month ago UTC</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mt-4">
            <div class="form-section-title mb-2">Live Settings</div>
            <div id="live-settings" class="row g-3">
              <div class="col-12">
                <label for="interval_mins" class="form-label">Trading Interval (min)</label>
                <input type="number" class="form-control form-control-lg" id="interval_mins" placeholder="5" min="1">
              </div>
            </div>
          </div>

          <div class="mt-4">
            <button id="start-btn" class="btn btn-lg btn-primary w-100 py-3 text-uppercase fw-semibold">
              Start Trading
            </button>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="glass rounded-4 p-4 h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Results</h2>
            <div class="d-flex align-items-center gap-2 text-secondary small">
              <span class="bg-success rounded-circle" style="width:8px; height:8px;"></span>
              Realtime logs
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label text-secondary">Live Logs</label>
            <div id="log-window" class="rounded-3 p-3">
              <div class="text-secondary">Logs will appear here...</div>
            </div>
          </div>

          <div class="card bg-transparent border-0">
            <div class="card-body glass rounded-3 p-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                  <h5 class="card-title mb-1">Summary</h5>
                  <p class="card-subtitle text-secondary mb-0">Updates after the run completes</p>
                </div>
                <span class="badge text-bg-info">Result</span>
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <div class="border rounded-3 p-3 h-100">
                    <div class="text-secondary small mb-1">Final Balance</div>
                    <div id="final-balance" class="fs-4 fw-semibold">$0.00</div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="border rounded-3 p-3 h-100">
                    <div class="text-secondary small mb-1">Profit / Loss</div>
                    <div id="profit-loss" class="fs-4 fw-semibold text-success">$0.00</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
